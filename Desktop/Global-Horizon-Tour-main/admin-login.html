<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - Global Horizons Travel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4f3f4212e0.js" crossorigin="anonymous"></script>
    <style>
        .admin-login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #011627;
            padding: 2rem;
        }

        .admin-login-card {
            background: #fff;
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .admin-logo-small {
            height: 60px;
            margin-bottom: 1.5rem;
        }

        .auth-group label {
            text-align: left;
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        #adminError {
            color: #e74c3c;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="admin-login-wrapper">
        <div class="admin-login-card">
            <img src="images/final_logo.png" alt="Logo" class="admin-logo-small">
            <h2 style="margin-bottom: 0.5rem; font-family: 'Playfair Display', serif;">Admin Portal</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 2rem;">Secure Access Only</p>

            <div id="adminError">Invalid admin credentials</div>

            <form id="adminLoginForm" class="auth-form">
                <div class="auth-group">
                    <label>Admin Username / Email</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-user-shield"></i>
                        <input type="text" id="adminId" placeholder="admin@globalhorizons.com" required>
                    </div>
                </div>

                <div class="auth-group">
                    <label>Password</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" id="toggleAdminPassword" style="position: absolute; right: 15px; cursor: pointer; color: #999;"></i>
                    </div>
                </div>

                <button type="submit" class="btn primary" style="width: 100%; padding: 1rem; border-radius: 12px; margin-top: 1rem; background: #022c43; color: #fff;">
                    Secure Login
                </button>
            </form>

            <div style="margin-top: 2rem;">
                <a href="index.html" style="font-size: 0.8rem; color: #999; text-decoration: underline;">Back to Website</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/admin-login.js"></script>

</body>

</html>
