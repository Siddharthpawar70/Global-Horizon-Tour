<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - Admin - Global Horizons Travel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4f3f4212e0.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --admin-primary: #022c43;
            --admin-accent: #f39c12;
            --admin-bg: #f4f7f6;
        }

        body {
            background-color: var(--admin-bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            width: 250px;
            background-color: var(--admin-primary);
            color: #fff;
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .sidebar-links a {
            color: rgba(255, 255, 255, 0.7);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .sidebar-links a.active {
            background-color: var(--admin-accent);
            color: var(--admin-primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 250px;
            flex-grow: 1;
            padding: 2rem;
        }

        .page-header {
            background: #fff;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #ddd;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div
            style="text-align: center; margin-bottom: 2rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px;">
            <a href="index.html">
                <img src="images/final_logo.png" alt="Global Horizon Tour"
                    style="width: 130px; margin-bottom: 10px; filter: brightness(0) invert(1);">
            </a>
            <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 1px;">Admin Dashboard</h2>
        </div>
        <div class="sidebar-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="admin-bookings.html"><i class="fas fa-book"></i> <span>Bookings</span></a>
            <a href="admin-prices.html"><i class="fas fa-tags"></i> <span>Package Prices</span></a>
            <a href="admin-customers.html"><i class="fas fa-users"></i> <span>Customers</span></a>
            <a href="admin-settings.html" class="active"><i class="fas fa-cog"></i> <span>Settings</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>System Settings</h1>
            <a href="index.html" style="color: #e74c3c; font-weight: 600;">Logout</a>
        </div>

        <div class="card">
            <div class="empty-state">
                <i class="fas fa-tools"></i>
                <p>No configuration settings found.</p>
            </div>
        </div>
    </div>
</body>

</html>
