<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Global Horizons Travel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4f3f4212e0.js" crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html">
                <img src="images/final_logo.png" alt="Global Horizon Tour" class="logo-img">
            </a>
        </div>
        <div class="nav-links">
                        <div class="localization-controls" style="display: flex; align-items: center; gap: 10px; margin-right: 15px;">
                <select id="currency-switcher" class="currency-select" style="padding: 5px; height: 30px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 14px;">
                    <option value="INR" style="color: black;">INR (₹)</option>
                    <option value="USD" style="color: black;">USD ($)</option>
                    <option value="EUR" style="color: black;">EUR (€)</option>
                    <option value="GBP" style="color: black;">GBP (£)</option>
                </select>
            </div>
            <div class="search-container">
                <input type="text" id="dest-search" placeholder="Search destinations...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="destinations.html">Destinations</a>
            <a href="packages.html">Packages</a>
            <a href="gallery.html">Gallery</a>
            <div class="booking-dropdown">
                <button class="dropbtn">Book now <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="booking.html"><i class="fas fa-plus-circle"></i> New Booking</a>
                    <a href="ticket.html"><i class="fas fa-ticket-alt"></i> My Tickets</a>
                </div>
            </div>
            <a href="contact.html">Contact</a>
            <div class="user-dropdown">
                <button class="user-icon-btn"><i class="fas fa-user-circle"></i></button>
                <div class="dropdown-content">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Please enter your details to continue your premium journey.</p>

            <form class="auth-form" id="loginForm">
                <div class="auth-group">
                    <label>Email ID / Mobile Number</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginId" placeholder="Email or Mobile" required>
                    </div>
                </div>

                <div class="auth-group">
                    <label>Password</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword" style="position: absolute; right: 15px; cursor: pointer; color: #999;"></i>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #666; cursor: pointer;">
                            <input type="checkbox" id="rememberMe"> Remember Me
                        </label>
                        <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--accent); font-weight: 600;">Forgot Password?</a>
                    </div>
                </div>

                <div id="loginError" style="color: #e74c3c; font-size: 0.85rem; margin-top: 1rem; display: none; text-align: center; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #ffebe0;">
                    Invalid email or password.
                </div>

                <button type="submit" class="btn primary" id="loginSubmit"
                    style="width: 100%; padding: 1rem; border-radius: 12px; margin-top: 1rem;">Login to Account</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register Now</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p>© 2025 Global Horizons Travel – Explore Beyond Borders</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>

    <script src="js/currency.js"></script>
</body>


</html>
