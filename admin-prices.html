<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Prices - Admin - Global Horizons Travel</title>
    <script src="js/admin-guard.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4f3f4212e0.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --admin-primary: #022c43;
            --admin-accent: #f39c12;
            --admin-bg: #f4f7f6;
        }

        body {
            background-color: var(--admin-bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            width: 250px;
            background-color: var(--admin-primary);
            color: #fff;
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .sidebar-links a {
            color: rgba(255, 255, 255, 0.7);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .sidebar-links a.active {
            background-color: var(--admin-accent);
            color: var(--admin-primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 250px;
            flex-grow: 1;
            padding: 2rem;
        }

        .page-header {
            background: #fff;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #999;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #ddd;
        }

        /* Inventory UI Improvements */
        .inventory-container {
            background: #fff;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
        }

        .search-filter-bar {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .admin-search-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .admin-search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .admin-search-wrapper input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 45px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        #category-filter {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8f9fa;
            padding: 1rem;
            color: var(--admin-primary);
            font-weight: 700;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 0.9rem;
        }

        .btn-add {
            background: var(--admin-accent);
            color: var(--admin-primary);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #e3f2fd;
            color: #1976d2;
        }

        .edit-btn:hover {
            background: #1976d2;
            color: #fff;
        }

        .delete-btn {
            background: #ffebee;
            color: #d32f2f;
        }

        .delete-btn:hover {
            background: #d32f2f;
            color: #fff;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 0;
            border: none;
            width: 500px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            background: var(--admin-primary);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            opacity: 0.7;
        }

        .close-modal:hover {
            opacity: 1;
        }

        #item-form {
            padding: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            background: #f8f9fa;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-primary {
            background: var(--admin-primary);
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .logout-link {
            color: #e74c3c;
            font-weight: 600;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .logout-link:hover {
            background: #e74c3c;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div
            style="text-align: center; margin-bottom: 2rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px;">
            <a href="index.html">
                <img src="images/final_logo.png" alt="Global Horizon Tour"
                    style="width: 130px; margin-bottom: 10px; filter: brightness(0) invert(1);">
            </a>
            <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 1px;">Admin Dashboard</h2>
        </div>
        <div class="sidebar-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
            <a href="admin-bookings.html"><i class="fas fa-book"></i> <span>Bookings</span></a>
            <a href="admin-prices.html" class="active"><i class="fas fa-tags"></i> <span>Package Prices</span></a>
            <a href="admin-customers.html"><i class="fas fa-users"></i> <span>Customers</span></a>
            <a href="admin-settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1>Inventory & Prices</h1>
                <p style="color: #666; font-size: 0.85rem;">Manage Destinations, Packages and their Pricing</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="add-item-btn" class="btn-add"><i class="fas fa-plus"></i> Add New Item</button>
                <a href="#" id="admin-prices-logout" class="logout-link">Logout</a>
            </div>
        </div>

        <div class="inventory-container">
            <div class="search-filter-bar">
                <div class="admin-search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="admin-search" placeholder="Search by name or category...">
                </div>
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="India">India</option>
                    <option value="International">International</option>
                    <option value="Package">Special Packages</option>
                </select>
            </div>

            <div class="table-wrapper">
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Base Price (₹/$)</th>
                            <th>Airport/Hub</th>
                            <th>Railway/Link</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Destination</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="itemName" required placeholder="e.g. Paris, France">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="itemCategory" required>
                            <option value="India">India</option>
                            <option value="International">International</option>
                            <option value="Package">Special Package</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Base Price (Numeric)</label>
                        <input type="number" id="itemPrice" required placeholder="Price value">
                    </div>
                    <div class="form-group">
                        <label>Airport Information</label>
                        <input type="text" id="itemAirport" placeholder="Airport Name/Code">
                    </div>
                    <div class="form-group">
                        <label>Railway/Station Info</label>
                        <input type="text" id="itemRailway" placeholder="Station Name/Code">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/destinationData.js"></script>
    <script src="js/packageData.js"></script>
    <script src="js/admin-prices.js"></script>
    <script>
        document.getElementById('admin-prices-logout').onclick = (e) => {
            e.preventDefault();
            localStorage.removeItem('isAdminLoggedIn');
            localStorage.removeItem('adminSession');
            window.location.href = 'admin-login.html';
        };
    </script>
</body>

</html>
