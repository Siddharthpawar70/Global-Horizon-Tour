<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Booking Successful - Global Horizons Travel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4f3f4212e0.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-card {
            background: white;
            padding: 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 2rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div style="position: absolute; top: 2rem; left: 50%; transform: translateX(-50%);">
        <a href="index.html">
            <img src="images/final_logo.png" alt="Global Horizon Tour" style="width: 150px;">
        </a>
    </div>
    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h1>Booking Successful 🎉</h1>
        <p>Your journey has been confirmed! We have sent the details to your email.</p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem;">
            <a href="ticket.html" class="btn primary" style="background:#0a3d62; color:#fff;">View Ticket</a>
            <a href="index.html" class="btn primary">Back to Home</a>
        </div>
    </div>
</body>

</html>
